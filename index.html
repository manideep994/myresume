<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoomLink — Video Chat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f12;
    --bg2: #13161b;
    --bg3: #1a1e25;
    --surface: #1f232c;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --accent: #4f7cff;
    --accent2: #7c5cff;
    --danger: #ff4f6a;
    --green: #2ecc8a;
    --text: #eef0f4;
    --muted: #7a8099;
    --radius: 12px;
    --font-mono: 'Space Mono', monospace;
    --font: 'DM Sans', sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* SCREENS */
  .screen { display: none; flex-direction: column; height: 100vh; }
  .screen.active { display: flex; }

  /* ── LOBBY ── */
  #lobby {
    align-items: center;
    justify-content: center;
    gap: 0;
    background: radial-gradient(ellipse at 30% 20%, rgba(79,124,255,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(124,92,255,0.10) 0%, transparent 60%),
                var(--bg);
  }

  .lobby-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 48px 52px;
    width: 440px;
    max-width: 95vw;
  }

  .logo {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; }

  h1 { font-size: 28px; font-weight: 600; line-height: 1.2; margin-bottom: 6px; }
  .sub { font-size: 14px; color: var(--muted); margin-bottom: 36px; }

  .input-group { margin-bottom: 16px; }
  .input-group label { display: block; font-size: 12px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

  input[type=text] {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type=text]:focus { border-color: var(--accent); }
  input[type=text]::placeholder { color: var(--muted); }

  .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; }
  .divider span { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 13px 20px;
    border-radius: 10px;
    font-family: var(--font);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .btn:active { transform: scale(0.98); }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #3d68ee; }
  .btn-outline { background: transparent; border: 1px solid var(--border2); color: var(--text); margin-top: 10px; }
  .btn-outline:hover { background: var(--bg3); }

  /* ── ROOM ── */
  #room { flex-direction: row; overflow: hidden; }

  .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* header */
  .room-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    gap: 12px;
  }

  .room-id-badge {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--accent);
    background: rgba(79,124,255,0.12);
    border: 1px solid rgba(79,124,255,0.25);
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .room-id-badge:hover { background: rgba(79,124,255,0.2); }

  .header-right { display: flex; align-items: center; gap: 10px; }

  .participant-count {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .live-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* video grid */
  .video-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 12px;
    padding: 16px;
    overflow-y: auto;
    background: var(--bg);
    align-content: start;
  }

  .video-tile {
    position: relative;
    border-radius: 14px;
    overflow: hidden;
    background: var(--bg3);
    border: 1px solid var(--border);
    aspect-ratio: 16/9;
  }

  .video-tile video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .tile-label {
    position: absolute;
    bottom: 10px; left: 12px;
    font-size: 12px;
    font-weight: 500;
    color: #fff;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
    padding: 3px 10px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .muted-icon { font-size: 10px; opacity: 0.8; }

  .cam-off-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    background: var(--bg3);
  }
  .avatar-circle {
    width: 64px; height: 64px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 600;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
  }
  .cam-off-name { font-size: 13px; color: var(--muted); }

  /* controls bar */
  .controls-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 16px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
  }

  .ctrl-btn {
    display: flex; align-items: center; justify-content: center;
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    font-size: 18px;
    transition: all 0.15s;
    position: relative;
  }
  .ctrl-btn:hover { background: var(--bg3); border-color: var(--border2); }
  .ctrl-btn.off { background: rgba(255,79,106,0.15); border-color: rgba(255,79,106,0.35); color: var(--danger); }
  .ctrl-btn.end { background: var(--danger); border-color: var(--danger); color: #fff; width: 56px; height: 56px; font-size: 20px; }
  .ctrl-btn.end:hover { background: #e83057; }

  .ctrl-btn .tooltip {
    position: absolute; bottom: calc(100% + 8px);
    left: 50%; transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--border2);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
    white-space: nowrap;
    color: var(--text);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    font-family: var(--font);
  }
  .ctrl-btn:hover .tooltip { opacity: 1; }

  /* chat sidebar */
  .chat-sidebar {
    width: 300px;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--bg2);
    transition: width 0.25s ease;
    overflow: hidden;
  }
  .chat-sidebar.collapsed { width: 0; border-left: none; }

  .chat-header {
    padding: 16px 16px 12px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 300px;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .msg { display: flex; flex-direction: column; gap: 3px; }
  .msg-meta { display: flex; align-items: baseline; gap: 8px; }
  .msg-name { font-size: 12px; font-weight: 500; color: var(--accent); }
  .msg-time { font-size: 10px; color: var(--muted); }
  .msg-text {
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
    background: var(--surface);
    padding: 8px 12px;
    border-radius: 0 10px 10px 10px;
    max-width: 240px;
    word-break: break-word;
  }
  .msg.self .msg-name { color: var(--green); text-align: right; }
  .msg.self { align-items: flex-end; }
  .msg.self .msg-text { border-radius: 10px 0 10px 10px; background: rgba(79,124,255,0.15); }
  .msg.system .msg-text { background: transparent; color: var(--muted); font-size: 12px; text-align: center; max-width: 100%; border-radius: 6px; }

  .chat-input-area {
    padding: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
    min-width: 300px;
    flex-shrink: 0;
  }

  .chat-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-size: 13px;
    font-family: var(--font);
    outline: none;
    transition: border-color 0.2s;
    resize: none;
  }
  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--muted); }

  .send-btn {
    width: 36px; height: 36px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #3d68ee; }

  /* notifications */
  .toast {
    position: fixed; top: 20px; right: 20px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 13px;
    color: var(--text);
    z-index: 999;
    animation: slideIn 0.2s ease;
    max-width: 300px;
  }
  @keyframes slideIn { from{transform:translateX(20px);opacity:0} to{transform:translateX(0);opacity:1} }

  /* unread badge */
  .unread-badge {
    position: absolute;
    top: -4px; right: -4px;
    background: var(--danger);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    width: 16px; height: 16px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    .chat-sidebar { width: 100%; position: absolute; right: 0; top: 0; bottom: 0; z-index: 10; }
    .chat-sidebar.collapsed { width: 0; }
    .lobby-card { padding: 32px 24px; }
  }
</style>
</head>
<body>

<!-- ── LOBBY SCREEN ── -->
<div id="lobby" class="screen active">
  <div class="lobby-card">
    <div class="logo"><span class="logo-dot"></span>RoomLink</div>
    <h1>Video Chat Rooms</h1>
    <p class="sub">Create or join a room — no sign up needed.</p>

    <div class="input-group">
      <label>Your Name</label>
      <input type="text" id="display-name" placeholder="Enter your name…" maxlength="24">
    </div>

    <div style="margin-top: 20px;">
      <button class="btn btn-primary" onclick="createRoom()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Create a new room
      </button>
    </div>

    <div class="divider"><span>or join existing</span></div>

    <div class="input-group">
      <label>Room Code</label>
      <input type="text" id="room-code-input" placeholder="Enter room code…" maxlength="8" style="text-transform:uppercase; font-family: var(--font-mono); letter-spacing: 0.1em;">
    </div>
    <button class="btn btn-outline" onclick="joinRoom()">Join Room</button>
  </div>
</div>

<!-- ── ROOM SCREEN ── -->
<div id="room" class="screen">
  <div class="main-area">
    <!-- header -->
    <div class="room-header">
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--text)">RoomLink</span>
        <div class="room-id-badge" id="room-badge" onclick="copyRoomCode()" title="Click to copy">
          #<span id="room-code-display"></span>
        </div>
      </div>
      <div class="header-right">
        <div class="participant-count">
          <span class="live-dot"></span>
          <span id="peer-count">1 participant</span>
        </div>
      </div>
    </div>

    <!-- video grid -->
    <div class="video-grid" id="video-grid"></div>

    <!-- controls -->
    <div class="controls-bar">
      <div class="ctrl-btn" id="mic-btn" onclick="toggleMic()">
        🎤<span class="tooltip">Mute mic</span>
      </div>
      <div class="ctrl-btn" id="cam-btn" onclick="toggleCam()">
        📷<span class="tooltip">Turn off camera</span>
      </div>
      <div class="ctrl-btn end" onclick="leaveRoom()" title="Leave">
        📞<span class="tooltip">Leave</span>
      </div>
      <div class="ctrl-btn" onclick="toggleChat()" id="chat-toggle-btn" style="position:relative">
        💬<span class="tooltip">Chat</span>
        <div class="unread-badge" id="unread-badge" style="display:none">0</div>
      </div>
    </div>
  </div>

  <!-- chat sidebar -->
  <div class="chat-sidebar" id="chat-sidebar">
    <div class="chat-header">
      <span>Chat</span>
      <svg onclick="toggleChat()" style="cursor:pointer;opacity:0.5;width:14px;height:14px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-area">
      <input class="chat-input" id="chat-input" placeholder="Message…" onkeydown="chatKeydown(event)">
      <button class="send-btn" onclick="sendChatMessage()">➤</button>
    </div>
  </div>
</div>

<script>
// ────────────────────────────────────────────
//  STATE
// ────────────────────────────────────────────
let myName = '';
let roomCode = '';
let localStream = null;
let micOn = true;
let camOn = true;
let chatOpen = true;
let unreadCount = 0;

// WebRTC peers: { peerId -> { pc, remoteStream } }
const peers = {};
const peerNames = {};

// BroadcastChannel for same-origin tab communication (simulates signaling)
let bc = null;
let myId = Math.random().toString(36).slice(2, 10);

// ────────────────────────────────────────────
//  LOBBY LOGIC
// ────────────────────────────────────────────
function createRoom() {
  const name = document.getElementById('display-name').value.trim();
  if (!name) { showToast('Please enter your name'); return; }
  myName = name;
  roomCode = Math.random().toString(36).slice(2, 8).toUpperCase();
  startRoom();
}

function joinRoom() {
  const name = document.getElementById('display-name').value.trim();
  const code = document.getElementById('room-code-input').value.trim().toUpperCase();
  if (!name) { showToast('Please enter your name'); return; }
  if (!code) { showToast('Please enter a room code'); return; }
  myName = name;
  roomCode = code;
  startRoom();
}

// ────────────────────────────────────────────
//  ROOM SETUP
// ────────────────────────────────────────────
async function startRoom() {
  document.getElementById('lobby').classList.remove('active');
  document.getElementById('room').classList.add('active');
  document.getElementById('room-code-display').textContent = roomCode;

  // Get local media
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch(e) {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
      camOn = false;
      updateCamBtn();
    } catch(e2) {
      localStream = new MediaStream();
      camOn = false; micOn = false;
      updateCamBtn(); updateMicBtn();
    }
  }

  // Render local tile
  renderLocalTile();

  // Setup BroadcastChannel for signaling
  bc = new BroadcastChannel('roomlink_' + roomCode);
  bc.onmessage = handleSignal;

  // Announce presence
  bc.postMessage({ type: 'join', from: myId, name: myName });

  addSystemMsg('You joined the room');
  updateParticipantCount();
}

function renderLocalTile() {
  const grid = document.getElementById('video-grid');
  let tile = document.getElementById('local-tile');
  if (!tile) {
    tile = document.createElement('div');
    tile.className = 'video-tile';
    tile.id = 'local-tile';
    grid.prepend(tile);
  }
  tile.innerHTML = '';

  const video = document.createElement('video');
  video.autoplay = true;
  video.muted = true;
  video.playsInline = true;
  if (camOn && localStream.getVideoTracks().length > 0) {
    video.srcObject = localStream;
    tile.appendChild(video);
  } else {
    const overlay = makeCamOffOverlay(myName);
    tile.appendChild(overlay);
  }

  const label = document.createElement('div');
  label.className = 'tile-label';
  label.textContent = myName + ' (You)';
  if (!micOn) {
    const mic = document.createElement('span');
    mic.className = 'muted-icon';
    mic.textContent = '🔇';
    label.appendChild(mic);
  }
  tile.appendChild(label);
}

function makeCamOffOverlay(name) {
  const d = document.createElement('div');
  d.className = 'cam-off-overlay';
  const av = document.createElement('div');
  av.className = 'avatar-circle';
  av.textContent = name.charAt(0).toUpperCase();
  const nm = document.createElement('div');
  nm.className = 'cam-off-name';
  nm.textContent = 'Camera off';
  d.appendChild(av);
  d.appendChild(nm);
  return d;
}

// ────────────────────────────────────────────
//  SIGNALING via BroadcastChannel
// ────────────────────────────────────────────
async function handleSignal(e) {
  const msg = e.data;
  if (msg.from === myId) return;

  if (msg.type === 'join') {
    peerNames[msg.from] = msg.name;
    addSystemMsg(msg.name + ' joined the room');
    // Create PC for new peer and offer
    const pc = await createPeerConnection(msg.from);
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    bc.postMessage({ type: 'offer', from: myId, to: msg.from, sdp: offer, name: myName });
    updateParticipantCount();

  } else if (msg.type === 'offer' && msg.to === myId) {
    peerNames[msg.from] = msg.name;
    const pc = await createPeerConnection(msg.from);
    await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    bc.postMessage({ type: 'answer', from: myId, to: msg.from, sdp: answer });

  } else if (msg.type === 'answer' && msg.to === myId) {
    const pc = peers[msg.from]?.pc;
    if (pc) await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));

  } else if (msg.type === 'ice' && msg.to === myId) {
    const pc = peers[msg.from]?.pc;
    if (pc && msg.candidate) {
      try { await pc.addIceCandidate(new RTCIceCandidate(msg.candidate)); } catch(e) {}
    }

  } else if (msg.type === 'leave') {
    removePeer(msg.from);
    const n = peerNames[msg.from] || 'Someone';
    addSystemMsg(n + ' left the room');
    delete peerNames[msg.from];
    updateParticipantCount();

  } else if (msg.type === 'chat') {
    receiveChatMsg(msg.name, msg.text, msg.ts);

  } else if (msg.type === 'state') {
    // peer updated cam/mic state
    if (msg.to === undefined || msg.to === myId) {
      updatePeerTile(msg.from, msg.micOn, msg.camOn);
    }
  }
}

async function createPeerConnection(peerId) {
  const pc = new RTCPeerConnection({
    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
  });

  peers[peerId] = { pc, remoteStream: new MediaStream() };

  // Add local tracks
  if (localStream) {
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  }

  pc.onicecandidate = e => {
    if (e.candidate) {
      bc.postMessage({ type: 'ice', from: myId, to: peerId, candidate: e.candidate });
    }
  };

  pc.ontrack = e => {
    peers[peerId].remoteStream.addTrack(e.track);
    renderRemoteTile(peerId, peers[peerId].remoteStream);
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
      removePeer(peerId);
      updateParticipantCount();
    }
  };

  return pc;
}

function removePeer(peerId) {
  if (peers[peerId]) {
    peers[peerId].pc.close();
    delete peers[peerId];
  }
  const tile = document.getElementById('peer-' + peerId);
  if (tile) tile.remove();
}

function renderRemoteTile(peerId, stream) {
  const grid = document.getElementById('video-grid');
  let tile = document.getElementById('peer-' + peerId);
  if (!tile) {
    tile = document.createElement('div');
    tile.className = 'video-tile';
    tile.id = 'peer-' + peerId;
    grid.appendChild(tile);
  }
  tile.innerHTML = '';

  const hasVideo = stream.getVideoTracks().length > 0;
  if (hasVideo) {
    const video = document.createElement('video');
    video.autoplay = true;
    video.playsInline = true;
    video.srcObject = stream;
    tile.appendChild(video);
  } else {
    tile.appendChild(makeCamOffOverlay(peerNames[peerId] || 'Peer'));
  }

  const label = document.createElement('div');
  label.className = 'tile-label';
  label.textContent = peerNames[peerId] || 'Peer';
  tile.appendChild(label);
}

function updatePeerTile(peerId, micOn, camOn) {
  // Re-render tile with new state info
  const tile = document.getElementById('peer-' + peerId);
  if (!tile) return;
  const label = tile.querySelector('.tile-label');
  if (label) {
    label.innerHTML = peerNames[peerId] || 'Peer';
    if (!micOn) label.innerHTML += ' <span class="muted-icon">🔇</span>';
  }
}

// ────────────────────────────────────────────
//  CONTROLS
// ────────────────────────────────────────────
function toggleMic() {
  micOn = !micOn;
  if (localStream) {
    localStream.getAudioTracks().forEach(t => t.enabled = micOn);
  }
  updateMicBtn();
  renderLocalTile();
  if (bc) bc.postMessage({ type: 'state', from: myId, micOn, camOn });
}

function updateMicBtn() {
  const btn = document.getElementById('mic-btn');
  btn.innerHTML = micOn ? '🎤' : '🔇';
  btn.querySelector ? null : null;
  btn.className = 'ctrl-btn' + (micOn ? '' : ' off');
  btn.innerHTML = (micOn ? '🎤' : '🔇') + '<span class="tooltip">' + (micOn ? 'Mute mic' : 'Unmute mic') + '</span>';
}

function toggleCam() {
  camOn = !camOn;
  if (localStream) {
    localStream.getVideoTracks().forEach(t => t.enabled = camOn);
  }
  updateCamBtn();
  renderLocalTile();
  if (bc) bc.postMessage({ type: 'state', from: myId, micOn, camOn });
}

function updateCamBtn() {
  const btn = document.getElementById('cam-btn');
  btn.className = 'ctrl-btn' + (camOn ? '' : ' off');
  btn.innerHTML = (camOn ? '📷' : '🚫') + '<span class="tooltip">' + (camOn ? 'Turn off camera' : 'Turn on camera') + '</span>';
}

function leaveRoom() {
  if (bc) {
    bc.postMessage({ type: 'leave', from: myId });
    bc.close();
  }
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  Object.keys(peers).forEach(id => peers[id].pc.close());
  // Reset and go back to lobby
  location.reload();
}

// ────────────────────────────────────────────
//  CHAT
// ────────────────────────────────────────────
function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('chat-sidebar').classList.toggle('collapsed', !chatOpen);
  if (chatOpen) {
    unreadCount = 0;
    document.getElementById('unread-badge').style.display = 'none';
  }
}

function chatKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChatMessage();
  }
}

function sendChatMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  const ts = Date.now();
  appendMsg(myName, text, ts, true);

  if (bc) {
    bc.postMessage({ type: 'chat', from: myId, name: myName, text, ts });
  }
}

function receiveChatMsg(name, text, ts) {
  appendMsg(name, text, ts, false);
  if (!chatOpen) {
    unreadCount++;
    const badge = document.getElementById('unread-badge');
    badge.style.display = 'flex';
    badge.textContent = unreadCount > 9 ? '9+' : unreadCount;
  }
}

function appendMsg(name, text, ts, isSelf) {
  const container = document.getElementById('chat-messages');
  const msg = document.createElement('div');
  msg.className = 'msg' + (isSelf ? ' self' : '');

  const time = new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  msg.innerHTML = `
    <div class="msg-meta">
      <span class="msg-name">${escHtml(name)}</span>
      <span class="msg-time">${time}</span>
    </div>
    <div class="msg-text">${escHtml(text)}</div>
  `;
  container.appendChild(msg);
  container.scrollTop = container.scrollHeight;
}

function addSystemMsg(text) {
  const container = document.getElementById('chat-messages');
  const msg = document.createElement('div');
  msg.className = 'msg system';
  msg.innerHTML = `<div class="msg-text">${escHtml(text)}</div>`;
  container.appendChild(msg);
  container.scrollTop = container.scrollHeight;
}

// ────────────────────────────────────────────
//  UTILS
// ────────────────────────────────────────────
function updateParticipantCount() {
  const count = 1 + Object.keys(peers).length;
  document.getElementById('peer-count').textContent =
    count + (count === 1 ? ' participant' : ' participants');
}

function copyRoomCode() {
  navigator.clipboard.writeText(roomCode).then(() => showToast('Room code copied: ' + roomCode));
}

function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Enter key on lobby inputs
document.getElementById('display-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const code = document.getElementById('room-code-input').value.trim();
    code ? joinRoom() : createRoom();
  }
});
document.getElementById('room-code-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinRoom();
});
</script>
</body>
</html>
