<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResumeChat — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent: #6fffe9;
    --accent2: #ff6b6b;
    --accent3: #c77dff;
    --text: #e8e8f0;
    --muted: #5a5a72;
    --card: #16161f;
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* GRID BACKGROUND */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(111,255,233,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(111,255,233,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 24px; }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 28px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-mark {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: grid;
    place-items: center;
    font-size: 18px;
    color: var(--bg);
    font-weight: 800;
  }
  .logo-text { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .logo-text span { color: var(--accent); }

  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    background: rgba(111,255,233,0.1);
    color: var(--accent);
    border: 1px solid rgba(111,255,233,0.2);
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  /* HERO */
  .hero {
    padding: 60px 0 40px;
    text-align: center;
  }
  .hero h1 {
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1.1;
    margin-bottom: 16px;
  }
  .hero h1 em {
    font-style: normal;
    color: var(--accent);
  }
  .hero p {
    color: var(--muted);
    font-size: 16px;
    font-family: 'DM Mono', monospace;
    font-weight: 300;
  }

  /* SECTION */
  .section { margin-bottom: 40px; }
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* FORM */
  .add-form {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 8px; }
  label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  input, textarea {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }
  input::placeholder, textarea::placeholder { color: var(--muted); }
  input:focus, textarea:focus {
    border-color: rgba(111,255,233,0.4);
    box-shadow: 0 0 0 3px rgba(111,255,233,0.06);
  }
  textarea { resize: vertical; min-height: 140px; line-height: 1.6; }

  .slug-preview {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }
  .slug-preview span { color: var(--accent); }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }
  .btn-primary {
    background: var(--accent);
    color: var(--bg);
  }
  .btn-primary:hover { background: #5ce8d4; transform: translateY(-1px); }
  .btn-sm {
    padding: 7px 14px;
    font-size: 12px;
    border-radius: 8px;
  }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger {
    background: transparent;
    border: 1px solid rgba(255,107,107,0.3);
    color: var(--accent2);
  }
  .btn-danger:hover { background: rgba(255,107,107,0.1); }

  .form-actions { display: flex; gap: 12px; margin-top: 4px; }

  /* RESUME CARDS */
  #resume-list { display: flex; flex-direction: column; gap: 16px; }

  .resume-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    transition: border-color 0.2s;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .resume-card:hover { border-color: rgba(111,255,233,0.2); }

  .card-icon {
    width: 46px; height: 46px;
    background: rgba(111,255,233,0.08);
    border: 1px solid rgba(111,255,233,0.15);
    border-radius: 12px;
    display: grid;
    place-items: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .card-info { flex: 1; min-width: 0; }
  .card-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-slug {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .card-slug span { color: var(--accent3); }

  .card-actions { display: flex; gap: 8px; flex-shrink: 0; }

  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    border: 1px dashed var(--border);
    border-radius: 16px;
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }

  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--accent);
    color: var(--bg);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    padding: 12px 20px;
    border-radius: 10px;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    .card-actions { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">
      <div class="logo-mark">R</div>
      <div class="logo-text">Resume<span>Chat</span></div>
    </div>
    <div class="badge">ADMIN PANEL</div>
  </header>

  <div class="hero">
    <h1>One platform,<br><em>many resumes</em></h1>
    <p>Each resume → unique link → recruiter chats with that version only</p>
  </div>

  <!-- ADD FORM -->
  <div class="section">
    <div class="section-label">Add New Resume</div>
    <div class="add-form">
      <div class="form-row">
        <div class="form-group">
          <label>Role / Label</label>
          <input type="text" id="inp-title" placeholder="e.g. Frontend Engineer" oninput="updateSlug()">
          <div class="slug-preview">Link ID: <span id="slug-preview">—</span></div>
        </div>
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" id="inp-name" placeholder="e.g. Alex Johnson">
        </div>
      </div>
      <div class="form-group" style="margin-bottom:16px">
        <label>Resume Content (paste full resume text)</label>
        <textarea id="inp-resume" placeholder="Paste your complete resume here — skills, experience, education, projects, achievements...&#10;&#10;The AI recruiter chat will ONLY use this content to answer questions."></textarea>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="addResume()">＋ Add Resume &amp; Get Link</button>
        <button class="btn btn-ghost btn-sm" onclick="clearForm()">Clear</button>
      </div>
    </div>
  </div>

  <!-- RESUME LIST -->
  <div class="section">
    <div class="section-label">Your Resumes</div>
    <div id="resume-list">
      <div class="empty-state">
        <div class="icon">📄</div>
        No resumes yet. Add your first one above.
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const BASE_URL = window.location.origin + window.location.pathname.replace('index.html','') + 'chat.html';
  const STORAGE_KEY = 'resumechat_resumes';

  function slugify(str) {
    return str.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  }

  function updateSlug() {
    const val = document.getElementById('inp-title').value;
    const slug = slugify(val) || '—';
    document.getElementById('slug-preview').textContent = slug !== '—' ? slug : '—';
  }

  function getResumes() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
  }

  function saveResumes(list) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  }

  function addResume() {
    const title = document.getElementById('inp-title').value.trim();
    const name = document.getElementById('inp-name').value.trim();
    const resume = document.getElementById('inp-resume').value.trim();

    if (!title) return showToast('Please enter a role/label');
    if (!name) return showToast('Please enter your name');
    if (!resume || resume.length < 50) return showToast('Resume content too short');

    const list = getResumes();
    let slug = slugify(title);
    // ensure unique slug
    let base = slug, i = 2;
    while (list.find(r => r.slug === slug)) slug = base + '-' + i++;

    list.push({ id: slug, slug, title, name, resume, created: Date.now() });
    saveResumes(list);
    clearForm();
    renderList();
    showToast('✓ Resume added! Link ready.');
  }

  function deleteResume(slug) {
    if (!confirm('Delete this resume? The link will stop working.')) return;
    saveResumes(getResumes().filter(r => r.slug !== slug));
    renderList();
    showToast('Deleted.');
  }

  function copyLink(slug) {
    const url = BASE_URL + '?r=' + slug;
    navigator.clipboard.writeText(url).then(() => showToast('✓ Link copied!'));
  }

  function openChat(slug) {
    window.open(BASE_URL + '?r=' + slug, '_blank');
  }

  function clearForm() {
    document.getElementById('inp-title').value = '';
    document.getElementById('inp-name').value = '';
    document.getElementById('inp-resume').value = '';
    document.getElementById('slug-preview').textContent = '—';
  }

  function renderList() {
    const list = getResumes();
    const el = document.getElementById('resume-list');
    if (!list.length) {
      el.innerHTML = `<div class="empty-state"><div class="icon">📄</div>No resumes yet. Add your first one above.</div>`;
      return;
    }
    el.innerHTML = list.sort((a,b) => b.created - a.created).map(r => `
      <div class="resume-card">
        <div class="card-icon">📋</div>
        <div class="card-info">
          <div class="card-title">${esc(r.title)}</div>
          <div class="card-slug">ID: <span>${esc(r.slug)}</span> &nbsp;·&nbsp; ${esc(r.name)}</div>
        </div>
        <div class="card-actions">
          <button class="btn btn-ghost btn-sm" onclick="copyLink('${esc(r.slug)}')">📋 Copy Link</button>
          <button class="btn btn-ghost btn-sm" onclick="openChat('${esc(r.slug)}')">↗ Preview</button>
          <button class="btn btn-danger btn-sm" onclick="deleteResume('${esc(r.slug)}')">✕</button>
        </div>
      </div>
    `).join('');
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  renderList();
</script>
</body>
</html>
