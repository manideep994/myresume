<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoomLink — Video Chat</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0d0f12;--bg2:#13161b;--bg3:#1a1e25;--surface:#1f232c;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
    --accent:#4f7cff;--accent2:#7c5cff;--danger:#ff4f6a;--green:#2ecc8a;
    --text:#eef0f4;--muted:#7a8099;--radius:12px;
    --font:'DM Sans',sans-serif;--mono:'Space Mono',monospace;
  }
  body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;}
  .screen{display:none;flex-direction:column;height:100vh;}
  .screen.active{display:flex;}

  /* LOBBY */
  #lobby{
    align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 30% 20%,rgba(79,124,255,.12) 0%,transparent 60%),
               radial-gradient(ellipse at 70% 80%,rgba(124,92,255,.10) 0%,transparent 60%),var(--bg);
  }
  .card{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:48px 52px;width:440px;max-width:95vw;}
  .logo{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:32px;display:flex;align-items:center;gap:8px;}
  .logo-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;}
  h1{font-size:28px;font-weight:600;line-height:1.2;margin-bottom:6px;}
  .sub{font-size:14px;color:var(--muted);margin-bottom:36px;}
  .input-group{margin-bottom:16px;}
  .input-group label{display:block;font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  input[type=text]{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:var(--font);font-size:15px;outline:none;transition:border-color .2s;}
  input[type=text]:focus{border-color:var(--accent);}
  input[type=text]::placeholder{color:var(--muted);}
  .divider{display:flex;align-items:center;gap:12px;margin:24px 0;}
  .divider span{font-size:12px;color:var(--muted);white-space:nowrap;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px 20px;border-radius:10px;font-family:var(--font);font-size:15px;font-weight:500;cursor:pointer;border:none;transition:all .15s;}
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{background:#3d68ee;}
  .btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text);margin-top:10px;}
  .btn-outline:hover{background:var(--bg3);}
  .status-msg{font-size:13px;color:var(--muted);text-align:center;margin-top:14px;min-height:20px;}

  /* ROOM */
  #room{flex-direction:row;overflow:hidden;}
  .main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .room-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--bg2);gap:12px;}
  .room-id-badge{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--accent);background:rgba(79,124,255,.12);border:1px solid rgba(79,124,255,.25);padding:5px 12px;border-radius:6px;cursor:pointer;transition:background .15s;user-select:none;}
  .room-id-badge:hover{background:rgba(79,124,255,.22);}
  .participant-count{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* VIDEO GRID */
  .video-grid{flex:1;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;padding:16px;overflow-y:auto;background:var(--bg);align-content:start;}
  .video-tile{position:relative;border-radius:14px;overflow:hidden;background:var(--bg3);border:1px solid var(--border);aspect-ratio:16/9;}
  .video-tile video{width:100%;height:100%;object-fit:cover;display:block;}
  .tile-label{position:absolute;bottom:10px;left:12px;font-size:12px;font-weight:500;color:#fff;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);padding:3px 10px;border-radius:6px;display:flex;align-items:center;gap:6px;max-width:90%;}
  .cam-off-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:var(--bg3);}
  .avatar-circle{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
  .cam-off-name{font-size:13px;color:var(--muted);}

  /* CONTROLS */
  .controls-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:16px;border-top:1px solid var(--border);background:var(--bg2);}
  .ctrl-btn{display:flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:50%;border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;font-size:18px;transition:all .15s;position:relative;}
  .ctrl-btn:hover{background:var(--bg3);}
  .ctrl-btn.off{background:rgba(255,79,106,.15);border-color:rgba(255,79,106,.35);color:var(--danger);}
  .ctrl-btn.end{background:var(--danger);border-color:var(--danger);color:#fff;width:56px;height:56px;font-size:20px;}
  .ctrl-btn.end:hover{background:#e83057;}
  .tooltip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border2);font-size:11px;padding:4px 10px;border-radius:6px;white-space:nowrap;color:var(--text);opacity:0;pointer-events:none;transition:opacity .15s;font-family:var(--font);}
  .ctrl-btn:hover .tooltip{opacity:1;}

  /* CHAT */
  .chat-sidebar{width:300px;border-left:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg2);transition:width .25s ease;overflow:hidden;}
  .chat-sidebar.collapsed{width:0;border-left:none;}
  .chat-header{padding:16px 16px 12px;font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;min-width:300px;}
  .chat-messages::-webkit-scrollbar{width:4px;}
  .chat-messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
  .msg{display:flex;flex-direction:column;gap:3px;}
  .msg-meta{display:flex;align-items:baseline;gap:8px;}
  .msg-name{font-size:12px;font-weight:500;color:var(--accent);}
  .msg-time{font-size:10px;color:var(--muted);}
  .msg-text{font-size:13px;line-height:1.5;color:var(--text);background:var(--surface);padding:8px 12px;border-radius:0 10px 10px 10px;max-width:240px;word-break:break-word;}
  .msg.self .msg-name{color:var(--green);text-align:right;}
  .msg.self{align-items:flex-end;}
  .msg.self .msg-text{border-radius:10px 0 10px 10px;background:rgba(79,124,255,.15);}
  .msg.system .msg-text{background:transparent;color:var(--muted);font-size:12px;text-align:center;max-width:100%;border-radius:6px;}
  .chat-input-area{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;min-width:300px;flex-shrink:0;}
  .chat-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:border-color .2s;}
  .chat-input:focus{border-color:var(--accent);}
  .chat-input::placeholder{color:var(--muted);}
  .send-btn{width:36px;height:36px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0;}
  .send-btn:hover{background:#3d68ee;}
  .unread-badge{position:absolute;top:-4px;right:-4px;background:var(--danger);color:#fff;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
  .toast{position:fixed;top:20px;right:20px;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:12px 20px;font-size:13px;color:var(--text);z-index:999;animation:slideIn .2s ease;max-width:320px;}
  @keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

  /* connecting spinner */
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:640px){
    .chat-sidebar{width:100%;position:absolute;right:0;top:0;bottom:0;z-index:10;}
    .chat-sidebar.collapsed{width:0;border-left:none;}
    .card{padding:32px 24px;}
  }
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby" class="screen active">
  <div class="card">
    <div class="logo"><span class="logo-dot"></span>RoomLink</div>
    <h1>Video Chat Rooms</h1>
    <p class="sub">Create or join a room — share the code with anyone.</p>

    <div class="input-group">
      <label>Your Name</label>
      <input type="text" id="display-name" placeholder="Enter your name…" maxlength="24">
    </div>

    <button class="btn btn-primary" onclick="createRoom()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Create a new room
    </button>

    <div class="divider"><span>or join existing</span></div>

    <div class="input-group">
      <label>Room Code</label>
      <input type="text" id="room-code-input" placeholder="e.g. ABC123" maxlength="10" style="text-transform:uppercase;font-family:var(--mono);letter-spacing:.12em;">
    </div>
    <button class="btn btn-outline" onclick="joinRoom()">Join Room</button>

    <div class="status-msg" id="lobby-status"></div>
  </div>
</div>

<!-- ROOM -->
<div id="room" class="screen">
  <div class="main-area">
    <div class="room-header">
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="font-family:var(--mono);font-size:13px;font-weight:700;">RoomLink</span>
        <div class="room-id-badge" id="room-badge" onclick="copyRoomCode()" title="Click to copy">
          #<span id="room-code-display"></span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="participant-count">
          <span class="live-dot"></span>
          <span id="peer-count">1 participant</span>
        </div>
      </div>
    </div>

    <div class="video-grid" id="video-grid"></div>

    <div class="controls-bar">
      <div class="ctrl-btn" id="mic-btn" onclick="toggleMic()">
        🎤<span class="tooltip">Mute mic</span>
      </div>
      <div class="ctrl-btn" id="cam-btn" onclick="toggleCam()">
        📷<span class="tooltip">Turn off camera</span>
      </div>
      <div class="ctrl-btn end" onclick="leaveRoom()">
        📞<span class="tooltip">Leave</span>
      </div>
      <div class="ctrl-btn" onclick="toggleChat()" style="position:relative;">
        💬<span class="tooltip">Chat</span>
        <div class="unread-badge" id="unread-badge" style="display:none">0</div>
      </div>
    </div>
  </div>

  <div class="chat-sidebar" id="chat-sidebar">
    <div class="chat-header">
      <span>Chat</span>
      <svg onclick="toggleChat()" style="cursor:pointer;opacity:.5;width:14px;height:14px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-area">
      <input class="chat-input" id="chat-input" placeholder="Message…" onkeydown="chatKey(event)">
      <button class="send-btn" onclick="sendChat()">➤</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────
let myName = '';
let roomCode = '';
let localStream = null;
let micOn = true;
let camOn = true;
let chatOpen = true;
let unreadCount = 0;

// PeerJS instance (our connection to the signaling server)
let myPeer = null;
// Map of peerId -> { call, conn, name, stream }
const peers = {};

// We use a "host" concept: the room code IS the host's peer ID prefix
// All peers connect to each other via a mesh
// We store known peer IDs in a shared "room registry" trick:
// Each peer, when it joins, calls a special data connection to roomCode+"_registry"
// and the registry (a separate Peer) broadcasts the member list
// 
// SIMPLER APPROACH: Use a room "hub" peer ID derived from the room code.
// The first person creates the hub peer. Everyone calls/connects to the hub peer ID.
// The hub keeps track of all members and broadcasts their peer IDs.
// We use a DataConnection mesh: everyone connects to everyone.

// ─────────────────────────────────────────────────────
// PEER IDS
// Room hub ID = "rl-" + roomCode (used for discovery)
// Each user's peer ID = random (assigned by PeerJS server)
// ─────────────────────────────────────────────────────

function hubId(code) { return 'rl-hub-' + code.toLowerCase(); }

// ─────────────────────────────────────────────────────
// LOBBY
// ─────────────────────────────────────────────────────
function setStatus(msg, spin=false) {
  document.getElementById('lobby-status').innerHTML =
    (spin ? '<span class="spinner"></span>' : '') + msg;
}

async function createRoom() {
  const name = document.getElementById('display-name').value.trim();
  if (!name) { showToast('Please enter your name'); return; }
  myName = name;
  roomCode = Math.random().toString(36).slice(2,8).toUpperCase();
  setStatus('<span class="spinner"></span>Setting up room…', false);
  await initPeer(true);
}

async function joinRoom() {
  const name = document.getElementById('display-name').value.trim();
  const code = document.getElementById('room-code-input').value.trim().toUpperCase();
  if (!name) { showToast('Please enter your name'); return; }
  if (!code)  { showToast('Please enter a room code'); return; }
  myName = name;
  roomCode = code;
  setStatus('<span class="spinner"></span>Connecting…', false);
  await initPeer(false);
}

// ─────────────────────────────────────────────────────
// PEER SETUP
// ─────────────────────────────────────────────────────
async function initPeer(isCreator) {
  // Get media first
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch(e) {
    try { localStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true }); camOn=false; }
    catch(e2) { localStream = new MediaStream(); camOn=false; micOn=false; }
  }

  // Create our PeerJS peer with a random ID
  myPeer = new Peer({ debug: 0 });

  myPeer.on('error', err => {
    console.error('Peer error:', err);
    if (err.type === 'peer-unavailable') {
      setStatus('Room not found. Check the code and try again.');
    } else {
      setStatus('Connection error: ' + err.message);
    }
  });

  myPeer.on('open', id => {
    console.log('My peer ID:', id);
    if (isCreator) {
      // Creator: try to claim the hub ID, or just start as regular peer
      startAsCreator();
    } else {
      // Joiner: connect to hub
      joinExistingRoom();
    }
  });

  // Handle incoming calls (video)
  myPeer.on('call', call => {
    const peerId = call.peer;
    call.answer(localStream);
    handleCall(call, peerId);
  });

  // Handle incoming data connections (chat + signaling)
  myPeer.on('connection', conn => {
    setupDataConn(conn);
  });
}

// ─────────────────────────────────────────────────────
// CREATOR: becomes the hub
// ─────────────────────────────────────────────────────
let hubPeer = null; // The hub Peer object (creator only)
let hubConns = [];  // All data connections the hub maintains (creator only)
let memberIds = []; // All peer IDs in the room

function startAsCreator() {
  // Try to claim the hub peer ID
  hubPeer = new Peer(hubId(roomCode), { debug: 0 });

  hubPeer.on('error', err => {
    if (err.type === 'unavailable-id') {
      // Room code already taken
      setStatus('Room code already exists. Try a different one or join instead.');
    } else {
      setStatus('Error: ' + err.message);
    }
  });

  hubPeer.on('open', () => {
    console.log('Hub open:', hubId(roomCode));
    memberIds = [myPeer.id];
    enterRoom();
  });

  // Hub handles join requests from new members
  hubPeer.on('connection', conn => {
    conn.on('open', () => {
      const joinerPeerId = conn.peer;
      const joinerName = null; // will arrive via data

      conn.on('data', data => {
        if (data.type === 'hello') {
          // Register new member
          const newcomerId = joinerPeerId;
          const newcomerName = data.name;

          // Tell the newcomer about all existing members
          conn.send({ type: 'members', members: memberIds.map(id => ({
            id,
            name: id === myPeer.id ? myName : (peers[id]?.name || 'Peer')
          }))});

          // Add to member list
          memberIds.push(newcomerId);

          // Tell all existing members about the newcomer
          hubConns.forEach(c => {
            if (c.peer !== newcomerId && c.open) {
              c.send({ type: 'new_member', id: newcomerId, name: newcomerName });
            }
          });

          // Tell the creator (me) about the newcomer
          onNewMember(newcomerId, newcomerName);
        }
        if (data.type === 'left') {
          memberIds = memberIds.filter(id => id !== joinerPeerId);
          hubConns = hubConns.filter(c => c.peer !== joinerPeerId);
          hubConns.forEach(c => {
            if (c.open) c.send({ type: 'member_left', id: joinerPeerId });
          });
          onMemberLeft(joinerPeerId);
        }
      });

      conn.on('close', () => {
        memberIds = memberIds.filter(id => id !== joinerPeerId);
        hubConns = hubConns.filter(c => c !== conn);
        hubConns.forEach(c => {
          if (c.open) c.send({ type: 'member_left', id: joinerPeerId });
        });
        onMemberLeft(joinerPeerId);
      });

      hubConns.push(conn);
    });
  });
}

// ─────────────────────────────────────────────────────
// JOINER: connects to hub, then meshes with everyone
// ─────────────────────────────────────────────────────
let hubConn = null; // Joiner's connection to hub

function joinExistingRoom() {
  hubConn = myPeer.connect(hubId(roomCode), { reliable: true });

  hubConn.on('error', err => setStatus('Could not reach hub: ' + err));

  hubConn.on('open', () => {
    hubConn.send({ type: 'hello', name: myName });
    enterRoom();
  });

  hubConn.on('data', data => {
    if (data.type === 'members') {
      // Connect to all existing members
      data.members.forEach(m => {
        if (m.id !== myPeer.id) {
          connectToMember(m.id, m.name);
        }
      });
    }
    if (data.type === 'new_member') {
      connectToMember(data.id, data.name);
    }
    if (data.type === 'member_left') {
      onMemberLeft(data.id);
    }
  });

  hubConn.on('close', () => {
    addSysMsg('Disconnected from room');
  });
}

// ─────────────────────────────────────────────────────
// MESH: connect to a specific peer (call + data)
// ─────────────────────────────────────────────────────
function connectToMember(peerId, peerName) {
  if (peers[peerId]) return; // already connected
  peers[peerId] = { name: peerName, call: null, conn: null, stream: null };

  // Data connection for chat & metadata
  const conn = myPeer.connect(peerId, { reliable: true });
  peers[peerId].conn = conn;

  conn.on('open', () => {
    conn.send({ type: 'hi', name: myName });
  });

  conn.on('data', data => handlePeerData(peerId, data));
  conn.on('close', () => onMemberLeft(peerId));

  // Call them for video
  const call = myPeer.call(peerId, localStream);
  peers[peerId].call = call;
  handleCall(call, peerId);

  addSysMsg((peerName || 'Someone') + ' is in the room');
  updateCount();
}

function handleCall(call, peerId) {
  if (!peers[peerId]) peers[peerId] = { name: '', call: null, conn: null, stream: null };
  peers[peerId].call = call;

  call.on('stream', remoteStream => {
    peers[peerId].stream = remoteStream;
    renderRemoteTile(peerId, remoteStream);
    updateCount();
  });

  call.on('close', () => onMemberLeft(peerId));
  call.on('error', err => console.error('call error', err));
}

function setupDataConn(conn) {
  const peerId = conn.peer;
  if (!peers[peerId]) peers[peerId] = { name: '', call: null, conn: null, stream: null };
  peers[peerId].conn = conn;

  conn.on('data', data => handlePeerData(peerId, data));
  conn.on('close', () => onMemberLeft(peerId));
}

function handlePeerData(peerId, data) {
  if (data.type === 'hi') {
    if (peers[peerId]) peers[peerId].name = data.name;
    updateTileLabel(peerId);
  }
  if (data.type === 'chat') {
    receiveChatMsg(data.name, data.text, data.ts);
  }
  if (data.type === 'state') {
    updateTileLabel(peerId, data.micOn, data.camOn);
  }
}

// ─────────────────────────────────────────────────────
// ROOM ENTER (both creator & joiner)
// ─────────────────────────────────────────────────────
function enterRoom() {
  document.getElementById('lobby').classList.remove('active');
  document.getElementById('room').classList.add('active');
  document.getElementById('room-code-display').textContent = roomCode;
  renderLocalTile();
  addSysMsg('You joined the room · Share code: ' + roomCode);
  updateCount();
}

// ─────────────────────────────────────────────────────
// MEMBER LEFT
// ─────────────────────────────────────────────────────
function onNewMember(peerId, name) {
  if (!peers[peerId]) peers[peerId] = { name, call: null, conn: null, stream: null };
  peers[peerId].name = name;
  addSysMsg((name || 'Someone') + ' joined the room');
  updateCount();
}

function onMemberLeft(peerId) {
  const name = peers[peerId]?.name || 'Someone';
  if (peers[peerId]?.call) try { peers[peerId].call.close(); } catch(e){}
  if (peers[peerId]?.conn) try { peers[peerId].conn.close(); } catch(e){}
  delete peers[peerId];
  const tile = document.getElementById('tile-' + peerId);
  if (tile) tile.remove();
  addSysMsg(name + ' left the room');
  updateCount();
}

// ─────────────────────────────────────────────────────
// RENDER TILES
// ─────────────────────────────────────────────────────
function renderLocalTile() {
  const grid = document.getElementById('video-grid');
  let tile = document.getElementById('tile-local');
  if (!tile) {
    tile = document.createElement('div');
    tile.className = 'video-tile';
    tile.id = 'tile-local';
    grid.prepend(tile);
  }
  tile.innerHTML = '';

  if (camOn && localStream && localStream.getVideoTracks().length > 0) {
    const v = document.createElement('video');
    v.autoplay = true; v.muted = true; v.playsInline = true;
    v.srcObject = localStream;
    tile.appendChild(v);
  } else {
    tile.appendChild(makeCamOff(myName));
  }

  const lbl = makeTileLabel(myName + ' (You)', !micOn);
  tile.appendChild(lbl);
}

function renderRemoteTile(peerId, stream) {
  const grid = document.getElementById('video-grid');
  let tile = document.getElementById('tile-' + peerId);
  if (!tile) {
    tile = document.createElement('div');
    tile.className = 'video-tile';
    tile.id = 'tile-' + peerId;
    grid.appendChild(tile);
  }
  tile.innerHTML = '';

  const hasVideo = stream && stream.getVideoTracks().length > 0;
  if (hasVideo) {
    const v = document.createElement('video');
    v.autoplay = true; v.playsInline = true;
    v.srcObject = stream;
    tile.appendChild(v);
  } else {
    tile.appendChild(makeCamOff(peers[peerId]?.name || 'Peer'));
  }

  const lbl = makeTileLabel(peers[peerId]?.name || 'Peer', false);
  lbl.id = 'lbl-' + peerId;
  tile.appendChild(lbl);
}

function updateTileLabel(peerId, mOff, cOff) {
  const lbl = document.getElementById('lbl-' + peerId);
  if (!lbl) return;
  const name = peers[peerId]?.name || 'Peer';
  lbl.innerHTML = esc(name) + (mOff===false||mOff===true ? (mOff ? '' : ' 🔇') : '');
}

function makeTileLabel(text, muted) {
  const d = document.createElement('div');
  d.className = 'tile-label';
  d.textContent = text;
  if (muted) { const s = document.createElement('span'); s.textContent = '🔇'; s.style.fontSize='11px'; d.appendChild(s); }
  return d;
}

function makeCamOff(name) {
  const d = document.createElement('div'); d.className = 'cam-off-overlay';
  const av = document.createElement('div'); av.className = 'avatar-circle';
  av.textContent = (name||'?').charAt(0).toUpperCase();
  const nm = document.createElement('div'); nm.className = 'cam-off-name'; nm.textContent = 'Camera off';
  d.append(av, nm); return d;
}

// ─────────────────────────────────────────────────────
// CONTROLS
// ─────────────────────────────────────────────────────
function toggleMic() {
  micOn = !micOn;
  if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = micOn);
  const btn = document.getElementById('mic-btn');
  btn.className = 'ctrl-btn' + (micOn ? '' : ' off');
  btn.innerHTML = (micOn?'🎤':'🔇') + '<span class="tooltip">'+(micOn?'Mute mic':'Unmute mic')+'</span>';
  renderLocalTile();
  broadcast({ type:'state', micOn, camOn, name: myName });
}

function toggleCam() {
  camOn = !camOn;
  if (localStream) localStream.getVideoTracks().forEach(t => t.enabled = camOn);
  const btn = document.getElementById('cam-btn');
  btn.className = 'ctrl-btn' + (camOn ? '' : ' off');
  btn.innerHTML = (camOn?'📷':'🚫') + '<span class="tooltip">'+(camOn?'Turn off camera':'Turn on camera')+'</span>';
  renderLocalTile();
  broadcast({ type:'state', micOn, camOn, name: myName });
}

function leaveRoom() {
  broadcast({ type: 'bye', name: myName });
  if (hubConn) try{hubConn.send({type:'left'});hubConn.close();}catch(e){}
  if (hubPeer) try{hubPeer.destroy();}catch(e){}
  if (myPeer)  try{myPeer.destroy();}catch(e){}
  if (localStream) localStream.getTracks().forEach(t=>t.stop());
  location.reload();
}

function broadcast(data) {
  Object.values(peers).forEach(p => {
    if (p.conn && p.conn.open) try { p.conn.send(data); } catch(e){}
  });
}

// ─────────────────────────────────────────────────────
// CHAT
// ─────────────────────────────────────────────────────
function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('chat-sidebar').classList.toggle('collapsed', !chatOpen);
  if (chatOpen) { unreadCount=0; document.getElementById('unread-badge').style.display='none'; }
}

function chatKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();} }

function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  const ts = Date.now();
  appendMsg(myName, text, ts, true);
  broadcast({ type:'chat', name: myName, text, ts });
}

function receiveChatMsg(name, text, ts) {
  appendMsg(name, text, ts, false);
  if (!chatOpen) {
    unreadCount++;
    const b = document.getElementById('unread-badge');
    b.style.display='flex'; b.textContent=unreadCount>9?'9+':unreadCount;
  }
}

function appendMsg(name, text, ts, self) {
  const c = document.getElementById('chat-messages');
  const time = new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const d = document.createElement('div');
  d.className = 'msg' + (self?' self':'');
  d.innerHTML = `<div class="msg-meta"><span class="msg-name">${esc(name)}</span><span class="msg-time">${time}</span></div><div class="msg-text">${esc(text)}</div>`;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

function addSysMsg(text) {
  const c = document.getElementById('chat-messages');
  const d = document.createElement('div');
  d.className = 'msg system';
  d.innerHTML = `<div class="msg-text">${esc(text)}</div>`;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

// ─────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────
function updateCount() {
  const n = 1 + Object.keys(peers).length;
  document.getElementById('peer-count').textContent = n + (n===1?' participant':' participants');
}

function copyRoomCode() {
  navigator.clipboard.writeText(roomCode).then(()=>showToast('Copied! Share this code: '+roomCode));
}

function showToast(msg) {
  const e = document.querySelector('.toast'); if(e) e.remove();
  const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),3000);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Enter key in lobby
document.getElementById('display-name').addEventListener('keydown',e=>{
  if(e.key==='Enter'){const c=document.getElementById('room-code-input').value.trim();c?joinRoom():createRoom();}
});
document.getElementById('room-code-input').addEventListener('keydown',e=>{
  if(e.key==='Enter')joinRoom();
});
</script>
</body>
